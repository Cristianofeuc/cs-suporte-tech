    a {

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 18px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(7, 11, 20, 0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: deslizarAbaixo 0.6s ease-out;

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #00bfff;
      transition: 0.3s;
    }
    .logo:hover {
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
    }

    nav a {
      margin-left: 25px;
      color: #ffffff;
      transition: 0.3s;
      font-weight: 500;
      position: relative;
    }

    nav a:hover {
      color: #00bfff;
    }
    
    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #00bfff;
      transition: width 0.3s ease;
    }
    nav a:hover::after {
      width: 100%;
    }

      gap: 60px;

        url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop') center/cover;
    }

    .hero-content {
      flex: 1.2;
      max-width: 680px;
    }

    .hero h1 {
      font-size: 46px;
      line-height: 1.35;
      margin-bottom: 30px;
      color: #ffffff;
      animation: surgirSubindo 0.8s ease-out forwards;
    }

    .hero span {
      color: #00bfff;
    }

      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 40px;
      color: #cccccc;
      animation: surgirSubindo 1s ease-out forwards;
    }
