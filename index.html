  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #070b14;
      color: white;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 18px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #00bfff;
    }

    nav a {
      margin-left: 25px;
      color: white;
      transition: 0.3s;
      font-weight: 500;
    }

    nav a:hover {
      color: #00bfff;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 8% 60px;
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)),
        url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop') center/cover;
    }

    .hero-content {
      max-width: 750px;
    }

    .hero h1 {
      font-size: 50px;
      line-height: 1.2;
      margin-bottom: 25px;
    }

    .hero span {
      color: #00bfff;
    }

    .hero p {
      font-size: 19px;
      line-height: 1.7;
      margin-bottom: 35px;
      color: #cfcfcf;
    }

    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s;
      display: inline-block;
      cursor: pointer;
    }

    .btn-primary {
      background: #00bfff;
      color: white;
      box-shadow: 0 0 20px rgba(0,191,255,0.4);
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      background: #00a2d8;
    }

    .btn-secondary {
      border: 2px solid #00bfff;
      color: #00bfff;
      background: transparent;
    }

    .btn-secondary:hover {
      background: #00bfff;
      color: white;
    }

    section {
      padding: 100px 8%;
    }

    .section-title {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-title h2 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    .section-title p {
      color: #bdbdbd;
      max-width: 700px;
      margin: auto;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
    }

    .service-card {
      background: #101826;
      padding: 35px;
      border-radius: 20px;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .service-card:hover {
      transform: translateY(-8px);
      border-color: #00bfff;
      box-shadow: 0 0 25px rgba(0,191,255,0.15);
    }
